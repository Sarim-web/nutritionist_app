name: nutritrack
description: "VitaCalo - Offline calorie tracker with local foods & privacy focus"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2

  # Localization (required for ARB / gen-l10n)
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Core packages
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^17.0.1        # Stable version (17.0.1 is very new — optional downgrade if issues)
  image_picker: ^1.1.2
  fl_chart: ^1.1.1         # ← FIXED: Use this stable version (avoids tooltip param rename issues)

  # Data export/import and file handling
  csv: ^6.0.0
  path_provider: ^2.1.5
  share_plus: ^12.0.1

  # Optional / future features
  connectivity_plus: ^7.0.0
  permission_handler: ^12.0.1
  flutter_riverpod: ^3.2.0   # If you're using Riverpod

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/splash/
    - assets/data/foods.json
    - assets/avatars/

  fonts:
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-Regular.ttf
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-Regular.ttf
    - family: NotoSansDevanagari
      fonts:
        - asset: assets/fonts/NotoSansDevanagari-Regular.ttf