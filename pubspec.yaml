name: nutritionist_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.1.0          # Latest stable (Riverpod 3.x series – highly recommended in 2026)
  hive: ^2.2.3
  hive_flutter: ^1.1.0              # Still the stable one for Flutter integration

  fl_chart: ^1.1.1                  # Latest stable – supports all your graph needs

  connectivity_plus: ^7.0.0         # Safe & up-to-date
  permission_handler: ^12.0.1       # Good version
  intl: ^0.20.2                     # Solid for localization
  go_router: ^17.0.1                # Latest stable (from flutter.dev team – very mature now)
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
